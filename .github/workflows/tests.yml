name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dev tools
        run: python -m pip install ".[dev]"

      - name: Lint
        run: python -m ruff check ancient_all_in_one tests

      - name: Compile source
        run: python -m compileall ancient_all_in_one tests

      - name: Run tests
        run: python -m unittest discover -s tests
