name: Bug report
description: Report a reproducible problem in Ancient All-in-One.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report this.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest steps that reproduce the issue.
      placeholder: "1. Open...\n2. Click...\n3. See..."
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Paste Help > Diagnostics output if available.
      render: text
